name = "gleepack"
version = "1.0.0"
description = "Bundle Gleam applications into standalone executables"
target = "erlang"

[dependencies]
glint = ">= 1.2.1 and < 2.0.0"
simplifile = ">= 2.4.0 and < 3.0.0"
filepath = ">= 1.1.2 and < 2.0.0"
gleam_erlang = ">= 1.3.0 and < 2.0.0"
gleam_otp = ">= 1.2.0 and < 2.0.0"
child_process = ">= 2.1.0 and < 3.0.0"
argv = ">= 1.0.2 and < 2.0.0"
tom = ">= 2.0.2 and < 3.0.0"
snag = ">= 1.2.0 and < 2.0.0"
gleam_community_ansi = ">= 1.4.4 and < 2.0.0"
platform = ">= 1.0.0 and < 2.0.0"
humanise = ">= 1.1.0 and < 2.0.0"
gleam_stdlib = ">= 0.71.0 and < 1.0.0"
gleam_http = ">= 4.3.0 and < 5.0.0"
gleam_httpc = ">= 5.0.0 and < 6.0.0"
directories = ">= 1.2.0 and < 2.0.0"
gleam_crypto = ">= 1.5.1 and < 2.0.0"
input = ">= 1.0.1 and < 2.0.0"
gleam_deque = ">= 1.0.0 and < 2.0.0"

[dev_dependencies]
gleeunit = ">= 1.9.0 and < 2.0.0"
